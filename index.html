<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aprender Jugando</title>

<style>

body{
font-family:'Comic Sans MS', sans-serif;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
background:#F4F9FF;
}

.container{
width:100%;
max-width:520px;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

button{
padding:20px;
margin:10px;
font-size:22px;
border:none;
border-radius:20px;
cursor:pointer;
width:80%;
}

.letras{background:#A8E6CF;}
.numeros{background:#FFD3B6;}
.figuras{background:#B5D9FF;}

.item{
font-size:140px;
}

.palabra{
font-size:30px;
margin-bottom:10px;
}

canvas{
border:3px dashed #bbb;
border-radius:15px;
background:#fff;
}

.hidden{
display:none;
}

.estrella{
font-size:120px;
color:gold;
}

.avanzar{
position:fixed;
bottom:25px;
right:25px;
font-size:50px;
background:#FFD966;
width:80px;
height:80px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* MEMORAMA */

#tablero{
display:grid;
grid-template-columns:repeat(4,80px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.carta{
width:80px;
height:80px;
background:#FFD966;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
}

.oculta{
background:#bbb;
color:transparent;
}

</style>
</head>

<body>

<div class="container">

<div id="inicio">

<h1>Aprender</h1>

<button class="letras" onclick="iniciar('letras')">📚 Letras</button>
<button class="numeros" onclick="iniciar('numeros')">🔢 Números</button>
<button class="figuras" onclick="iniciar('figuras')">🔺 Figuras</button>
<button onclick="iniciarMemorama()">🧠 Memorama</button>

</div>

<div id="aprendizaje" class="hidden">

<div class="item" id="item"></div>

<div class="palabra" id="palabra"></div>

<div style="font-size:40px;cursor:pointer;" onclick="hablar()">🔊</div>

<h3>Dibuja aquí ✏</h3>

<canvas id="canvas" width="350" height="220"></canvas>

<br>

<button onclick="limpiar()">🧽 Borrar</button>

<br>

<button onclick="volver()">Volver</button>

</div>

<div id="memorama" class="hidden">

<h2>Memorama</h2>

<div id="tablero"></div>

<br>

<button onclick="volver()">Volver</button>

</div>

<div id="final" class="hidden">

<div class="estrella">⭐</div>

<h2>¡Muy bien!</h2>

<button onclick="reiniciar()">Volver al inicio</button>

</div>

</div>

<div class="avanzar" onclick="siguiente()">➡</div>

<script>

/* ACTIVAR AUDIO EN WEBVIEW */

document.addEventListener("touchstart",function(){
speechSynthesis.cancel();
},{once:true});


/* DATOS */

const letras="ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("");
const numeros=[...Array(10).keys()];
const figuras=["⬜","🔺","⚫","⬛","⭐"];

const nombresFiguras={
"⬜":"Cuadrado",
"🔺":"Triángulo",
"⚫":"Círculo",
"⬛":"Rectángulo",
"⭐":"Estrella"
};

let lista=[];
let modo="";
let index=0;

/* CANVAS */

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let dibujando=false;

ctx.lineWidth=6;
ctx.lineCap="round";

function posicion(e){
let rect=canvas.getBoundingClientRect();
return{
x:e.clientX-rect.left,
y:e.clientY-rect.top
};
}

/* MOUSE */

canvas.addEventListener("mousedown",()=>dibujando=true);
canvas.addEventListener("mouseup",()=>{dibujando=false;ctx.beginPath();});
canvas.addEventListener("mousemove",(e)=>{
if(!dibujando)return;
let p=posicion(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(p.x,p.y);
});

/* TOUCH */

canvas.addEventListener("touchstart",(e)=>{
dibujando=true;
let t=e.touches[0];
let p=posicion(t);
ctx.moveTo(p.x,p.y);
e.preventDefault();
});

canvas.addEventListener("touchmove",(e)=>{
if(!dibujando)return;
let t=e.touches[0];
let p=posicion(t);
ctx.lineTo(p.x,p.y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(p.x,p.y);
e.preventDefault();
});

canvas.addEventListener("touchend",()=>{dibujando=false;ctx.beginPath();});

/* APP */

function iniciar(tipo){

modo=tipo;
index=0;

if(tipo=="letras")lista=letras;
if(tipo=="numeros")lista=numeros;
if(tipo=="figuras")lista=figuras;

document.getElementById("inicio").classList.add("hidden");
document.getElementById("aprendizaje").classList.remove("hidden");

mostrar();

}

function mostrar(){

let valor=lista[index];

document.getElementById("item").textContent=valor;

if(modo=="letras")
document.getElementById("palabra").textContent="Letra "+valor;

else if(modo=="numeros")
document.getElementById("palabra").textContent="Número "+valor;

else
document.getElementById("palabra").textContent=nombresFiguras[valor];

dibujarGuia(valor);

}

function siguiente(){

index++;

if(index>=lista.length){

document.getElementById("aprendizaje").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");
hablar("Muy bien");

return;
}

mostrar();

}

/* VOZ CORREGIDA */

function hablar(texto){

if(!texto)
texto=document.getElementById("palabra").textContent;

let speech=new SpeechSynthesisUtterance(texto);

speech.lang="es-MX";
speech.rate=0.9;

speechSynthesis.cancel();
speechSynthesis.speak(speech);

}

/* CANVAS GUIA */

function dibujarGuia(simbolo){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.font="120px Arial";
ctx.fillStyle="rgba(150,150,150,0.25)";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(simbolo,canvas.width/2,canvas.height/2);

}

function limpiar(){
dibujarGuia(lista[index]);
}

function volver(){

document.getElementById("aprendizaje").classList.add("hidden");
document.getElementById("memorama").classList.add("hidden");
document.getElementById("inicio").classList.remove("hidden");

}

function reiniciar(){

document.getElementById("final").classList.add("hidden");
document.getElementById("inicio").classList.remove("hidden");

}

/* MEMORAMA 16 CARTAS */

let cartas=[];
let primera=null;
let segunda=null;
let bloqueo=false;

function iniciarMemorama(){

document.getElementById("inicio").classList.add("hidden");
document.getElementById("memorama").classList.remove("hidden");

crearMemorama();

}

function crearMemorama(){

let elementos=["A","A","1","1","2","2","B","B","⭐","⭐","🔺","🔺","3","3","⬜","⬜"];

cartas=elementos.sort(()=>Math.random()-0.5);

let tablero=document.getElementById("tablero");
tablero.innerHTML="";

cartas.forEach(valor=>{

let carta=document.createElement("div");

carta.className="carta oculta";
carta.dataset.valor=valor;
carta.innerHTML=valor;

carta.onclick=voltear;

tablero.appendChild(carta);

});

}

function voltear(){

if(bloqueo)return;

this.classList.remove("oculta");

if(!primera){
primera=this;
return;
}

segunda=this;

bloqueo=true;

if(primera.dataset.valor===segunda.dataset.valor){

hablar("Bien");

primera=null;
segunda=null;
bloqueo=false;

verificar();

}else{

setTimeout(()=>{

primera.classList.add("oculta");
segunda.classList.add("oculta");

primera=null;
segunda=null;
bloqueo=false;

},800);

}

}

function verificar(){

let ocultas=document.querySelectorAll(".oculta");

if(ocultas.length===0){

hablar("Ganaste");

document.getElementById("memorama").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");

}

}

</script>

</body>
</html>
