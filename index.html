<script>

const letras="ABCDEFGHIJKLMNГ‘OPQRSTUVWXYZ".split("");

/* NUMEROS HASTA 100 */

const numeros=[];
for(let i=0;i<=100;i++)numeros.push(i.toString());

const figuras=["в¬њ","рџ”є","вљ«","в­ђ"];

const nombresFiguras={
"в¬њ":"Cuadrado",
"рџ”є":"TriГЎngulo",
"вљ«":"CГ­rculo",
"в­ђ":"Estrella"
};

const palabras={
A:"A de ГЃrbol",
B:"B de Barco",
C:"C de Casa",
D:"D de Dado",
E:"E de Elefante"
};

let lista=[];
let modo="";
let index=0;

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

/* CONFIGURACION DIBUJO */

let dibujando=false;

ctx.lineWidth=6;
ctx.lineCap="round";
ctx.strokeStyle="#333";

/* EVENTOS MOUSE */

canvas.addEventListener("mousedown",()=>dibujando=true);
canvas.addEventListener("mouseup",()=>dibujando=false);
canvas.addEventListener("mouseleave",()=>dibujando=false);

canvas.addEventListener("mousemove",dibujar);

/* EVENTOS TOUCH */

canvas.addEventListener("touchstart",(e)=>{
dibujando=true;
e.preventDefault();
});

canvas.addEventListener("touchend",()=>dibujando=false);

canvas.addEventListener("touchmove",(e)=>{

let rect=canvas.getBoundingClientRect();

let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;

dibujar({offsetX:x,offsetY:y});

e.preventDefault();

});

/* FUNCION DIBUJAR */

function dibujar(e){

if(!dibujando)return;

ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);

}

/* INICIAR MODOS */

function iniciar(tipo){

modo=tipo;
index=0;

if(tipo=="letras")lista=letras;
if(tipo=="numeros")lista=numeros;
if(tipo=="figuras")lista=figuras;

document.getElementById("inicio").classList.add("hidden");
document.getElementById("aprendizaje").classList.remove("hidden");

mostrar();

}

function mostrar(){

let valor=lista[index];

document.getElementById("item").textContent=valor;

if(modo=="letras")
document.getElementById("palabra").textContent=palabras[valor]||valor;

else if(modo=="numeros")
document.getElementById("palabra").textContent="NГєmero "+valor;

else
document.getElementById("palabra").textContent=nombresFiguras[valor];

dibujarGuia(valor);

}

/* SIGUIENTE */

function siguiente(){

index++;

if(index>=lista.length){
index=0;
}

mostrar();

}

/* VOZ */

function hablar(){

let texto=document.getElementById("palabra").textContent;

let speech=new SpeechSynthesisUtterance(texto);

speech.lang="es-ES";

speechSynthesis.speak(speech);

}

/* VOLVER */

function volver(){

document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));

document.getElementById("inicio").classList.remove("hidden");

}

/* GUIA DE DIBUJO */

function dibujarGuia(simbolo){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.font="120px Arial";

ctx.fillStyle="rgba(150,150,150,0.25)";

ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(simbolo,canvas.width/2,canvas.height/2);

}

/* LIMPIAR */

function limpiar(){

ctx.clearRect(0,0,canvas.width,canvas.height);

dibujarGuia(lista[index]);

}

/* MEMORIA */

let cartas=[];
let abiertas=[];

function iniciarMemoria(){

document.getElementById("inicio").classList.add("hidden");
document.getElementById("memoria").classList.remove("hidden");

let base=["A","3","в¬њ","B","5","рџ”є"];

cartas=[...base,...base];

cartas.sort(()=>Math.random()-0.5);

let grid=document.getElementById("grid");

grid.innerHTML="";

cartas.forEach((c,i)=>{

let card=document.createElement("div");

card.className="card";

card.dataset.valor=c;

card.dataset.index=i;

card.onclick=voltear;

grid.appendChild(card);

});

}

function voltear(){

if(this.classList.contains("open"))return;

this.textContent=this.dataset.valor;

this.classList.add("open");

abiertas.push(this);

if(abiertas.length==2){

let a=abiertas[0];
let b=abiertas[1];

if(a.dataset.valor==b.dataset.valor){

abiertas=[];

}else{

setTimeout(()=>{

a.textContent="";
b.textContent="";
a.classList.remove("open");
b.classList.remove("open");

abiertas=[];

},800);

}

}

}

</script>
